AWSTemplateFormatVersion: '2010-09-09'
Description: 'Narad - RDS PostgreSQL with pgvector support'

Parameters:
  EnvironmentName:
    Type: String
    Default: narad-prod
  DBPassword:
    Type: String
    NoEcho: true
    Description: RDS master password
  DBName:
    Type: String
    Default: narad

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Narad RDS subnet group
      SubnetIds:
        - !ImportValue narad-prod-PublicSubnet1
        - !ImportValue narad-prod-PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-db-subnet-group

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow PostgreSQL from App Runner only
      VpcId: !ImportValue narad-prod-VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16  # VPC internal only
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-db-sg

  NaradDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${EnvironmentName}-postgres
      DBInstanceClass: db.t4g.micro       # Cheapest ARM instance ~$14/mo
      Engine: postgres
      EngineVersion: '16.4'               # PostgreSQL 16 natively supports pgvector
      MasterUsername: narad
      MasterUserPassword: !Ref DBPassword
      DBName: !Ref DBName
      AllocatedStorage: '20'              # 20 GB minimum
      StorageType: gp3
      MultiAZ: false                      # Single AZ to save cost (hackathon)
      PubliclyAccessible: false           # Private — accessed by App Runner inside VPC
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 1            # 1 day backup (minimum)
      DeletionProtection: false
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-postgres

Outputs:
  DBEndpoint:
    Description: RDS PostgreSQL endpoint
    Value: !GetAtt NaradDB.Endpoint.Address
    Export:
      Name: !Sub ${EnvironmentName}-DBEndpoint

  DBPort:
    Description: RDS PostgreSQL port
    Value: !GetAtt NaradDB.Endpoint.Port
    Export:
      Name: !Sub ${EnvironmentName}-DBPort
