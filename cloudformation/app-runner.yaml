AWSTemplateFormatVersion: '2010-09-09'
Description: 'Narad - App Runner service for FastAPI backend'

Parameters:
  EnvironmentName:
    Type: String
    Default: narad-prod
  ECRImageURI:
    Type: String
    Description: Full ECR image URI (e.g., 123456789.dkr.ecr.us-east-1.amazonaws.com/narad-backend:latest)
  DatabaseURL:
    Type: String
    NoEcho: true
    Description: Full PostgreSQL connection string
  AWSRegion:
    Type: String
    Default: us-east-1
  BedrockModelFast:
    Type: String
    Default: us.anthropic.claude-haiku-4-5-20251001-v1:0
  BedrockModelDeep:
    Type: String
    Default: us.anthropic.claude-3-5-sonnet-20241022-v2:0

Resources:
  AppRunnerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-apprunner-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonBedrockFullAccess
        - arn:aws:iam::aws:policy/ComprehendFullAccess
      Policies:
        - PolicyName: ECRAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:GetAuthorizationToken
                Resource: '*'

  ECRAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-apprunner-ecr-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess


  NaradBackendService:
    Type: AWS::AppRunner::Service
    Properties:
      ServiceName: !Sub ${EnvironmentName}-backend
      SourceConfiguration:
        AuthenticationConfiguration:
          AccessRoleArn: !GetAtt ECRAccessRole.Arn
        ImageRepository:
          ImageIdentifier: !Ref ECRImageURI
          ImageRepositoryType: ECR
          ImageConfiguration:
            Port: '8000'
            RuntimeEnvironmentVariables:
              - Name: DATABASE_URL
                Value: !Ref DatabaseURL
              - Name: AWS_REGION
                Value: !Ref AWSRegion
              - Name: LLM_BACKEND
                Value: bedrock
              - Name: BEDROCK_MODEL_ID_FAST
                Value: !Ref BedrockModelFast
              - Name: BEDROCK_MODEL_ID
                Value: !Ref BedrockModelDeep
              - Name: EMBEDDING_BACKEND
                Value: local            # paraphrase-multilingual-MiniLM (baked in Docker)
              - Name: KMP_DUPLICATE_LIB_OK
                Value: 'TRUE'
              - Name: STORAGE_BACKEND
                Value: local
              - Name: FAISS_INDEX_PATH
                Value: /tmp/faiss_index
      InstanceConfiguration:
        Cpu: '1 vCPU'
        Memory: '2 GB'
        InstanceRoleArn: !GetAtt AppRunnerRole.Arn
      HealthCheckConfiguration:
        Protocol: HTTP
        Path: /health
        Interval: 20
        Timeout: 10
        HealthyThreshold: 1
        UnhealthyThreshold: 10
      AutoScalingConfigurationArn: !GetAtt AutoScalingConfig.AutoScalingConfigurationArn
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-backend

  AutoScalingConfig:
    Type: AWS::AppRunner::AutoScalingConfiguration
    Properties:
      AutoScalingConfigurationName: !Sub ${EnvironmentName}-autoscaling
      MinSize: 1
      MaxSize: 2          # Max 2 instances (hackathon — low traffic expected)
      MaxConcurrency: 25  # Requests handled by a single instance before scaling

Outputs:
  AppRunnerURL:
    Description: App Runner service URL (use as NEXT_PUBLIC_API_URL in Amplify)
    Value: !GetAtt NaradBackendService.ServiceUrl
    Export:
      Name: !Sub ${EnvironmentName}-AppRunnerURL
